<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>IEEE CS UNI - Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script src="js/data.js" defer></script>
  <script src="js/sidebar.js" defer></script>
  <script src="js/render.js" defer></script>
</head>

<body>
  <div class="app">
    <div class="overlay" id="mobileOverlay" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" aria-label="Menú lateral">
      <div class="sidebar__header">
        <div class="sidebar__chapter-label">Capítulo Estudiantil</div>
        <div class="sidebar__chapter-name">IEEE CS UNI</div>
      </div>

      <nav class="sidebar__nav" aria-label="Navegación principal">
        <div class="nav-group">
          <span class="nav-group__label">Principal</span>

          <a href="#" class="nav-item is-active" aria-current="page">
            <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span class="nav-item__label">Dashboard</span>
          </a>

          <a href="#" class="nav-item">
            <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span class="nav-item__label">Miembros</span>
          </a>

          <a href="#" class="nav-item">
            <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 11 12 14 22 4"></polyline>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            <span class="nav-item__label">Tareas</span>
            <span class="nav-item__badge">3</span>
          </a>
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar avatar--sm">U</div>

          <div class="sidebar__user-info">
            <div class="sidebar__user-name">Administrador</div>
          </div>

          <button class="sidebar__logout" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <header class="topbar">
      <div class="topbar__left">
        <button
          class="hamburger"
          id="hamburgerBtn"
          type="button"
          aria-label="Abrir menú"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <span class="topbar__breadcrumb">Dashboard / Resumen</span>
        <h1 class="topbar__mobile-title">Resumen</h1>
      </div>

      <div class="topbar__right">
        <div class="topbar__search">
          <svg class="topbar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>

          <input
            type="text"
            class="topbar__search-input"
            placeholder="Buscar miembros, tareas..."
            aria-label="Buscar"
          >
        </div>

        <div class="topbar__divider hide-mobile"></div>

        <button class="topbar__notifications" type="button" aria-label="Notificaciones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="notif-badge">2</span>
        </button>

        <div class="topbar__user">
          <div class="avatar avatar--md">U</div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="main__inner animate-fade-in">
        <div class="section-header">
          <h2 class="section-title">Vista General</h2>
        </div>

        <div class="stats-grid" id="statsContainer"></div>

        <div class="two-col two-col--60-40">
          <section class="card" aria-labelledby="tasksTitle">
            <div class="card__header">
              <h3 class="card__title" id="tasksTitle">Tareas Recientes</h3>
              <a href="#" class="section-link">Ver tablero</a>
            </div>

            <div class="card__body">
              <div class="task-list" id="tasksContainer"></div>
            </div>
          </section>

          <section class="card" aria-labelledby="eventsTitle">
            <div class="card__header">
              <h3 class="card__title" id="eventsTitle">Próximos Eventos</h3>
            </div>

            <div class="card__body">
              <div class="events-list" id="eventsContainer"></div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navegación inferior">
      <a href="#" class="bottom-nav__item is-active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        Inicio
      </a>

      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
        </svg>
        Miembros
      </a>

      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        Tareas
      </a>
    </nav>
  </div>
</body>
</html>
