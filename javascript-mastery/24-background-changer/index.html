<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Backgorund Changer</title>
</head>

<body>
    <main>
        <div class="changer-container">
            <div class="palet-svg">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2 0-.49-.18-.96-.51-1.34C13.17 18.25 13 17.65 13 17c0-1.1.9-2 2-2h2c3.31 0 6-2.69 6-6C23 5.05 18.06 2 12 2ZM6.5 12c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5Zm3-4c-.83 0-1.5-.67-1.5-1.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8Zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8Zm4.5 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5Z" fill="currentColor"/>
                </svg>
            </div>
            <h1>Background Changer</h1>
            <p>Transform your screen with beautiful colors and gradients</p>
        </div>

        <div class="button-container">
            <button class="button-changer"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none"><path stroke="currentColor" stroke-width="2" d="M3 7h1.78c2.152 0 3.228 0 4.1.456a4 4 0 0 1 1.005.749c.688.703.997 1.734 1.615 3.795s.928 3.092 1.615 3.795c.294.301.633.554 1.006.749c.871.456 1.947.456 4.1.456H21m0 0l-3-3m3 3l-3 3"/><path fill="currentColor" fill-rule="evenodd" d="m21.707 6.293l-3-3l-1.414 1.414L18.586 6h-.411c-1.038 0-1.881 0-2.573.06c-.717.064-1.349.198-1.945.51a5 5 0 0 0-1.21.888c.241.393.43.8.594 1.21q.169.426.332.923a2.5 2.5 0 0 1 .457-.688a3 3 0 0 1 .755-.56c.275-.145.617-.239 1.193-.29C16.371 8.001 17.127 8 18.22 8h.366l-1.293 1.293l1.414 1.414l3-3L22.414 7zm-11.154 10.25a8 8 0 0 1-.594-1.21a16 16 0 0 1-.332-.924a2.5 2.5 0 0 1-.457.688a3 3 0 0 1-.755.56c-.275.145-.617.24-1.193.29c-.593.052-1.349.053-2.442.053H3v2h1.825c1.038 0 1.881 0 2.572-.06c.718-.064 1.35-.198 1.946-.51a5 5 0 0 0 1.21-.888" clip-rule="evenodd"/></g></svg>Random Color</button>
            <button class="button-changer"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4.4 21L3 19.6l7.525-7.55L6 10.925l4.95-3.075L10.525 2L15 5.775l5.4-2.2L18.225 9L22 13.45l-5.85-.4l-3.1 4.95l-1.125-4.525zM5 8L3 6l2-2l2 2zm13 13l-2-2l2-2l2 2z"/></svg>Random Gradient</button>
        </div>

        <div class="colors-gradients">
            <div class="color-picker">
                <div class="head-container">
                    <div class="squareContainer-svg"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 512 512"><path fill="currentColor" d="M72.156 21.906c-19.51-.096-34.187 10.357-43.47 26.47c-14.848 25.778-10.262 56.354 29.845 79.56c26.354 15.25 61.527 23.54 86.75 20.126l-11.374 19.72l15.25 8.812l49.688-86.25l-15.25-8.813l-10.5 18.22c-9.66-23.603-34.394-49.968-60.75-65.22c-15.04-8.703-28.482-12.566-40.188-12.624zm134.375 92.53l-9.343 16.22l171.75 99.375h-56.25l-129.562-75l-9.344 16.19L382.53 292l3.376 1.97l3.75-1.033c3.705-1.014 10.983-.39 18.344 1.844c7.36 2.237 14.843 5.778 19.656 8.564l2.188 1.25h.72c.224.082.458.145.686.22a16.6 16.6 0 0 0-.594 4.373c0 9.165 7.43 16.594 16.594 16.594s16.594-7.428 16.594-16.592c0-6.497-3.75-12.09-9.188-14.813c1.873-3.64 2.85-7.855 2.156-12.406c-.77-5.067-4.173-10.32-9.187-13.22c-10.71-6.198-25.414-17.442-27.97-27.688l-.967-3.843l-3.438-1.97l-208.72-120.813zm242.94 235.47c-18.66 69.634-44.595 59.99-44.595 100.75c0 24.617 19.98 44.563 44.594 44.563c24.613 0 44.592-19.947 44.592-44.564c0-44.002-25.602-29.875-44.593-100.75z"/></svg></div>
                    <h2>Solid Colors</h2>
                </div>

                <div class="palette-grid">
                    <span class="panel"></span>
                    <span class="panel"></span>
                    <span class="panel"></span>
                    <span class="panel"></span>
                </div>
            </div>

            <div class="gradient-picker">
                <label>Custom Color</label>
                <div class="input-container">
                    <input 
                        type="color" 
                        id="colorPicker" 
                        name="colorPicker"
                        value="#ff0000"
                    >
                    <input type="text">
                    <button class="apply">Apply</button>
                </div>
            </div>
        </div>

        <div class="colors-gradients">
            <div class="color-picker">
                <div class="head-container">
                    <div class="squareContainer-svg"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4.4 21L3 19.6l7.525-7.55L6 10.925l4.95-3.075L10.525 2L15 5.775l5.4-2.2L18.225 9L22 13.45l-5.85-.4l-3.1 4.95l-1.125-4.525zM5 8L3 6l2-2l2 2zm13 13l-2-2l2-2l2 2z"/></svg></div>
                    <h2>Gradients</h2>
                </div>

                <div class="colors-container">
                    <span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span><span class="panel"></span>
                </div>
                <p>Click any gradient to apply it instantly</p>
            </div>
        </div>

        <div class="info-styles colors-gradients">
            <div class="color-picker">
                <div class="head-container">
                    <div class="squareContainer-svg"></div>
                    <h3>Current Backgorund</h3>
                </div>

                <div class="copy-container">
                    <div id="type-span"><span class="opacity">Type:</span><span class="boldness">Solid</span></div>
                    <div class="copy-css">
                        <span class="opacity" id="cssText">CSS</span>
                        <div class="code-container"><code></code></div>
                        <button class="apply copy-code">Copy</button>
                        <div class="footer-copy">
                            <p id="proTip"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M7 9.667A2.667 2.667 0 0 1 9.667 7h8.666A2.667 2.667 0 0 1 21 9.667v8.666A2.667 2.667 0 0 1 18.333 21H9.667A2.667 2.667 0 0 1 7 18.333z"/><path d="M4.012 16.737A2 2 0 0 1 3 15V5c0-1.1.9-2 2-2h10c.75 0 1.158.385 1.5 1"/></g></svg>Pro tip: Copy the CSS code and use it in your own projects!</p>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>
</body>
</html>
