<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropdown Menu</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <span class="eyebrow">Project 19</span>

      <h1>Dropdown Menu</h1>

      <p>
        A keyboard-friendly dropdown menu with nested options, focus states and ARIA attributes.
      </p>

      <div class="dropdown" id="profile-dropdown">
        <button
          class="dropdown-trigger"
          id="dropdown-trigger"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="dropdown-menu"
        >
          <span>Profile</span>
          <span class="trigger-icon" aria-hidden="true">⌄</span>
        </button>

        <div class="dropdown-menu" id="dropdown-menu" role="menu" aria-labelledby="dropdown-trigger">
          <button class="dropdown-item" type="button" role="menuitem">
            Account
          </button>

          <div class="dropdown-item-wrapper">
            <button
              class="dropdown-item submenu-trigger"
              id="submenu-trigger"
              type="button"
              role="menuitem"
              aria-haspopup="true"
              aria-expanded="false"
              aria-controls="settings-submenu"
            >
              <span>Settings</span>
              <span aria-hidden="true">›</span>
            </button>

            <div class="submenu" id="settings-submenu" role="menu" aria-labelledby="submenu-trigger">
              <button class="dropdown-item" type="button" role="menuitem">
                Security
              </button>

              <button class="dropdown-item" type="button" role="menuitem">
                Billing
              </button>

              <button class="dropdown-item" type="button" role="menuitem">
                Notifications
              </button>
            </div>
          </div>

          <button class="dropdown-item" type="button" role="menuitem">
            Help Center
          </button>

          <button class="dropdown-item dropdown-item-danger" type="button" role="menuitem">
            Logout
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
