<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Animated Buttons</title>

  <link rel="stylesheet" href="css/styles.css" />

  <link rel="stylesheet" href="css/button1.css" />
  <link rel="stylesheet" href="css/button2.css" />
  <link rel="stylesheet" href="css/button3.css" />
  <link rel="stylesheet" href="css/button4.css" />
  <link rel="stylesheet" href="css/button5.css" />
  <link rel="stylesheet" href="css/button6.css" />
  <link rel="stylesheet" href="css/button7.css" />
  <link rel="stylesheet" href="css/button8.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Project 16</p>
      <h1>Animated Button Collection</h1>
      <p class="hero__description">
        A small collection of reusable CSS-only buttons built with transitions,
        transforms, hover states, active states, and focus-visible styles.
      </p>
    </section>

    <section class="buttons-section" aria-labelledby="buttons-title">
      <div class="section-header">
        <h2 id="buttons-title">Button Variants</h2>
        <p>
          Each button explores a different animation pattern using pure CSS.
        </p>
      </div>

      <div class="buttons-grid">
        <!-- Button 01: Lift -->
        <button class="lift-button">Levántame!</button> 

        <!-- Button 02: Glow -->
        <button class="glow-button">Press me!</button>

        <!-- Button 03: Slide Background -->
         <button class="slide-button">Slide it</button>

        <!-- Button 04: Border Draw -->
         <button class="border-draw">Draw it</button>

        <!-- Button 05: Press -->
        <button class="press-btn">Press this</button>
        
        <!-- Butto>n 06: Scale -->
        <button class="scale-btn">Scalling...</button>

      </div>
    </section>
  </main>
</body>
</html>
